# ── Docker profile ─────────────────────────────────────────────────
# Active when: SPRING_PROFILES_ACTIVE=docker (set by docker-compose.yml)

spring:
  cloud:
    stream:
      binders:
        solace-binder:
          environment:
            solace:
              java:
                host: "tcp://solace:55555"
                msgVpn: banking-vpn
                clientUsername: notification-svc
                clientPassword: ${SOLACE_NOTIFICATION_SVC_PASSWORD}

app:
  routing:
    service-url: http://routing-service:8085
