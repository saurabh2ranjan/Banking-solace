server:
  port: 8083

spring:
  application:
    name: notification-service

  cloud:
    function:
      definition: onAccountClosed;onAccountCreated;onPaymentCompleted;onPaymentFailed
    stream:
      binders:
        solace-binder:
          type: solace
          environment:
            solace:
              java:
                host: "tcp://localhost:55555"
                msgVpn: default
                clientUsername: default
                clientPassword: ""
                connectRetries: 3
                reconnectRetries: 5
      bindings:
        # ── SUBSCRIBERS ─────────────────────────────────────────────
        onAccountClosed-in-0:
          destination: banking/v1/account/closed
          group: notification-service-group
          binder: solace-binder
          content-type: application/json

        onAccountCreated-in-0:
          destination: banking/v1/account/created
          group: notification-service-group
          binder: solace-binder
          content-type: application/json

        onPaymentCompleted-in-0:
          destination: banking/v1/payment/completed
          group: notification-service-group
          binder: solace-binder
          content-type: application/json

        onPaymentFailed-in-0:
          destination: banking/v1/payment/failed
          group: notification-service-group
          binder: solace-binder
          content-type: application/json

# ── Routing validation config ──────────────────────────────────────
# consumer-topics mirrors the binding destinations above.
# RoutingValidator checks these against routing-service at startup.
app:
  routing:
    service-url: http://localhost:8085
    consumer-topics:
      ACCOUNT_CLOSED:    banking/v1/account/closed
      ACCOUNT_CREATED:   banking/v1/account/created
      PAYMENT_COMPLETED: banking/v1/payment/completed
      PAYMENT_FAILED:    banking/v1/payment/failed

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.banking.notification: DEBUG
    com.solace: INFO
