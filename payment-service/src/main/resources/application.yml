server:
  port: 8082

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5433/payments_db
    username: payments_user
    password: payments_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Redis (host/port overridden per profile) ──────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    function:
      definition: handlePaymentCompleted;handlePaymentFailed;handleRoutingUpdated
    stream:
      binders:
        solace-binder:
          type: solace
          environment:
            solace:
              java:
                host: "tcp://localhost:55555"
                msgVpn: default
                clientUsername: default
                clientPassword: ""
                connectRetries: 3
                reconnectRetries: 5
      bindings:
        # ── PUBLISHERS ──────────────────────────────────────────────
        paymentInitiatedPublisher-out-0:
          destination: banking/v1/payment/initiated
          binder: solace-binder
          content-type: application/json

        # ── SUBSCRIBERS ─────────────────────────────────────────────
        handlePaymentCompleted-in-0:
          destination: banking/v1/payment/completed
          group: payment-service-group
          binder: solace-binder
          content-type: application/json

        handlePaymentFailed-in-0:
          destination: banking/v1/payment/failed
          group: payment-service-group
          binder: solace-binder
          content-type: application/json

        # Route-change events — no group: every instance receives independently
        handleRoutingUpdated-in-0:
          destination: banking/v1/routing/updated
          binder: solace-binder
          content-type: application/json

# ── Dynamic routing config ─────────────────────────────────────────
app:
  routing:
    service-url: http://localhost:8085
    cache-file: ${java.io.tmpdir}/banking-routing/payment-service-routes.json
    cache-max-age-hours: 24
    connect-timeout-seconds: 3
    retry-attempts: 2
    required-event-types:
      - PAYMENT_INITIATED
    fallback-topics:
      PAYMENT_INITIATED: banking/v1/payment/initiated

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.banking.payment: DEBUG
    com.solace: INFO
