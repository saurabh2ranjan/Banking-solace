# ── Docker profile ─────────────────────────────────────────────────
# Active when: SPRING_PROFILES_ACTIVE=docker (set by docker-compose.yml)
# Uses Docker container names as hostnames inside banking-network

spring:
  datasource:
    url: jdbc:postgresql://postgres-accounts:5432/accounts_db

  data:
    redis:
      host: redis
      port: 6379

  cloud:
    stream:
      binders:
        solace-binder:
          environment:
            solace:
              java:
                host: "tcp://solace:55555"

app:
  routing:
    service-url: http://routing-service:8085
    cache-file: /var/cache/routing/account-service-routes.json
