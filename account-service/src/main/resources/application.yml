server:
  port: 8081

spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://localhost:5432/accounts_db
    username: accounts_user
    password: accounts_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Redis (host/port overridden per profile) ──────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    function:
      definition: processPayment;handleRoutingUpdated;handleRoutingBulkUpdated
    stream:
      binders:
        solace-binder:
          type: solace
          environment:
            solace:
              java:
                host: "tcp://localhost:55555"
                msgVpn: default
                clientUsername: default
                clientPassword: ""
                connectRetries: 3
                reconnectRetries: 5
      bindings:
        # ── PUBLISHERS ──────────────────────────────────────────────
        accountClosedPublisher-out-0:
          destination: banking/v1/account/closed
          binder: solace-binder
          content-type: application/json
        accountCreatedPublisher-out-0:
          destination: banking/v1/account/created
          binder: solace-binder
          content-type: application/json
        accountUpdatedPublisher-out-0:
          destination: banking/v1/account/updated
          binder: solace-binder
          content-type: application/json
        paymentCompletedPublisher-out-0:
          destination: banking/v1/payment/completed
          binder: solace-binder
          content-type: application/json
        paymentFailedPublisher-out-0:
          destination: banking/v1/payment/failed
          binder: solace-binder
          content-type: application/json

        # ── SUBSCRIBERS ─────────────────────────────────────────────
        processPayment-in-0:
          destination: banking/v1/payment/initiated
          group: account-service-group
          binder: solace-binder
          content-type: application/json

        # Route-change events — no group: every instance receives independently
        handleRoutingUpdated-in-0:
          destination: banking/v1/routing/updated
          binder: solace-binder
          content-type: application/json

        # Bulk route-change — no group: every instance receives independently
        handleRoutingBulkUpdated-in-0:
          destination: banking/v1/routing/bulk-updated
          binder: solace-binder
          content-type: application/json

# ── Dynamic routing config ─────────────────────────────────────────
app:
  routing:
    service-url: http://localhost:8085
    cache-file: ${java.io.tmpdir}/banking-routing/account-service-routes.json
    cache-max-age-hours: 24
    connect-timeout-seconds: 3
    max-attempts: 3
    required-event-types:
      - ACCOUNT_CREATED
      - ACCOUNT_UPDATED
      - ACCOUNT_CLOSED
      - PAYMENT_COMPLETED
      - PAYMENT_FAILED
    fallback-topics:
      ACCOUNT_CREATED:   banking/v1/account/created
      ACCOUNT_UPDATED:   banking/v1/account/updated
      ACCOUNT_CLOSED:    banking/v1/account/closed
      PAYMENT_COMPLETED: banking/v1/payment/completed
      PAYMENT_FAILED:    banking/v1/payment/failed

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.banking.account: DEBUG
    com.solace: INFO
