# ── Local development profile ──────────────────────────────────────
# Usage: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

spring:
  data:
    mongodb:
      uri: mongodb://audit_user:audit_pass@localhost:27017/audit_db?authSource=admin

  cloud:
    stream:
      binders:
        solace-binder:
          environment:
            solace:
              java:
                host: "tcp://localhost:55555"

app:
  routing:
    service-url: http://localhost:8085
