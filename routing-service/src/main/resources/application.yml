server:
  port: 8085

spring:
  application:
    name: routing-service

  # ── JPA (datasource injected per profile) ─────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Flyway ────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Spring Cloud Stream — publisher binding ──────────────────────
  cloud:
    function:
      definition: routingUpdatedPublisher;routingBulkUpdatedPublisher
    stream:
      binders:
        solace-binder:
          type: solace
          environment:
            solace:
              java:
                msgVpn: default
                clientUsername: default
                clientPassword: ""
                connectRetries: 3
                reconnectRetries: 5
      bindings:
        routingUpdatedPublisher-out-0:
          destination: banking/v1/routing/updated
          binder: solace-binder
          content-type: application/json
        routingBulkUpdatedPublisher-out-0:
          destination: banking/v1/routing/bulk-updated
          binder: solace-binder
          content-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.banking.routing: DEBUG
    com.solace: INFO
