version: '3.8'

# ─────────────────────────────────────────────────────────────────
# Infrastructure only — Solace, PostgreSQL, MongoDB, Redis
# Usage: docker-compose -f infra/docker-compose.yml up -d
# Then run each service locally with:
#   cd <service> && ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# ─────────────────────────────────────────────────────────────────

services:

  # ── Solace PubSub+ Event Broker ──────────────────────────────────
  solace:
    image: solace/solace-pubsub-standard:latest
    container_name: solace-pubsub
    hostname: solace
    ports:
      - "8080:8080"
      - "55555:55555"
      - "55003:55003"
      - "55443:55443"
      - "8008:8008"
      - "1883:1883"
      - "5672:5672"
      - "9000:9000"
    environment:
      - username_admin_globalaccesslevel=admin
      - username_admin_password=admin
      - system_scaling_maxconnectioncount=100
    shm_size: '2g'
    ulimits:
      core: -1
      nofile:
        soft: 2448
        hard: 6592
    volumes:
      - solace-data:/var/lib/solace
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Redis — shared cache (routing rules + future uses) ───────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL for Account Service ───────────────────────────────
  postgres-accounts:
    image: postgres:16-alpine
    container_name: postgres-accounts
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: accounts_user
      POSTGRES_PASSWORD: accounts_pass
    ports:
      - "5432:5432"
    volumes:
      - pg-accounts-data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounts_user -d accounts_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL for Payment Service ───────────────────────────────
  postgres-payments:
    image: postgres:16-alpine
    container_name: postgres-payments
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: payments_user
      POSTGRES_PASSWORD: payments_pass
    ports:
      - "5433:5432"
    volumes:
      - pg-payments-data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_user -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL for Routing Service ───────────────────────────────
  postgres-routing:
    image: postgres:16-alpine
    container_name: postgres-routing
    environment:
      POSTGRES_DB: routing_db
      POSTGRES_USER: routing_user
      POSTGRES_PASSWORD: routing_pass
    ports:
      - "5434:5432"
    volumes:
      - pg-routing-data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routing_user -d routing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB for Audit Service ────────────────────────────────────
  mongo-audit:
    image: mongo:7
    container_name: mongo-audit
    environment:
      MONGO_INITDB_ROOT_USERNAME: audit_user
      MONGO_INITDB_ROOT_PASSWORD: audit_pass
      MONGO_INITDB_DATABASE: audit_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-audit-data:/data/db
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer — Browser DB UI ──────────────────────────────────────
  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8090:8080"
    networks:
      - banking-network
    restart: unless-stopped

volumes:
  solace-data:
  pg-accounts-data:
  pg-payments-data:
  pg-routing-data:
  mongo-audit-data:

networks:
  banking-network:
    driver: bridge
    name: banking-network
